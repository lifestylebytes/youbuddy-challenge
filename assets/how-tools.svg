<svg xmlns="http://www.w3.org/2000/svg" width="760" height="1164" viewBox="0 0 760 1164" role="img" aria-labelledby="title desc">
  <title id="title">Learning tools screenshot</title>
  <desc id="desc">Word test and typing practice screen.</desc>
  <rect width="760" height="1164" fill="#f4f1ff"/>
  <text x="29" y="45" font-family="Arial, sans-serif" font-size="19" fill="#8276e9">단어 시험 · 총 3문제</text>
  <rect x="638" y="20" width="101" height="43" rx="22" fill="#e6defd"/>
  <text x="688" y="49" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#6250b8">1 / 3</text>
  <rect x="29" y="91" width="710" height="124" rx="24" fill="#fff8df" stroke="#f5cf5d"/>
  <text x="78" y="137" font-family="Arial, sans-serif" font-size="24" fill="#7b5200">✍️</text>
  <text x="107" y="139" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#7b5200">주황색 빈칸을 탭하고 직접 타이핑하세요.</text>
  <text x="107" y="180" font-family="Arial, sans-serif" font-size="24" fill="#7b5200">정답을 입력하면 자동으로 다음 문제로 넘어가요.</text>
  <rect x="29" y="245" width="710" height="826" rx="44" fill="#fff" stroke="#e7dfff"/>
  <text x="153" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="35" font-weight="700" fill="#38364f">Let's</text>
  <rect x="210" y="318" width="340" height="78" rx="15" fill="#fff8df"/>
  <text x="380" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="800" fill="#777">여기 탭</text>
  <rect x="210" y="390" width="340" height="6" fill="#f4a52d"/>
  <text x="384" y="469" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#38364f">for our new campaign</text>
  <text x="384" y="528" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#38364f">by reviewing the data first.</text>
  <text x="384" y="626" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#75728e">데이터를 먼저 검토하면서 새 캠페인을 위한</text>
  <text x="384" y="678" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#75728e">판을 깔아봅시다.</text>
  <text x="384" y="728" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#7b57ff">뜻 · 기틀을 마련하다 / 판을 깔다</text>
  <rect x="143" y="775" width="177" height="86" rx="43" fill="#fff" stroke="#ded5ff" stroke-width="2"/>
  <text x="231" y="829" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="800" fill="#46425f">힌트 보기</text>
  <rect x="342" y="775" width="284" height="86" rx="43" fill="#fff" stroke="#ded5ff" stroke-width="2"/>
  <text x="484" y="829" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#827e98">🎤 음성으로 답하기</text>
  <rect x="64" y="899" width="640" height="82" rx="41" fill="#574b3c"/>
  <text x="384" y="950" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#fff">Skip</text>
  <text x="384" y="1028" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#8276e9">정답을 맞추면 자동으로 다음 문제로 넘어가요.</text>
  <text x="384" y="1065" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#8276e9">모르면 힌트를 눌러보세요.</text>
</svg>
